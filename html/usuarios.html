<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>

    <link rel="stylesheet" href="../css/usuarios.css">
    <script src="../js/auth.js" defer></script>
    <script src="../js/usuarios.js" defer></script>
</head>

<body>

    <nav class="side-menu" id="side-menu">
        <ul>
            <li id="menuUsuarios"><a href="usuarios.html">Gestão de Usuários</a></li>
            <li id="menuAmbientes"><a href="ambientes.html">Gestão de Ambientes</a></li>
            <li id="menuInstrutores"><a href="instrutores.html">Gestão de Instrutores</a></li>
            <li id="menuTurmas"><a href="turmas.html">Gestão de Turmas</a></li>
            <li id="menuRegistros"><a href="registros.html">Registrar Ocupação</a></li>
            <li id="menuOcupacao"><a href="ocupacao.html">Ocupação em Tempo Real</a></li>
            <li id="menuPainel"><a href="painel.html">Ocupação em Tempo Real</a></li>
            <li id="menuRelatorios"><a href="relatorios.html">Gerar Relatório</a></li>
        </ul>
    </nav>

    <div class="home">
        <button class="menu-btn" id="menu-btn">
            <img src="../img/lula.png">
        </button>
    </div>

    <div id="menu-config" class="menu-config">
        <button onclick="logout()">Sair</button>
    </div>

    <div class="header-onda">
        <h1>Usuários</h1>
    </div>

    <div class="container-mais">
        <div class="menu-mais">
            <button onclick="abrirModalAdicionar()">Adicionar Usuário</button>
        </div>
    </div>

    <div class="tabela-wrapper">
        <table class="Tabelas">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaUsuarios"></tbody>
        </table>
    </div>

    <div id="overlay" class="blur-overlay"></div>

    <div id="modalAdicionar" class="modal">
        <div class="modal-content">
            <h2>Novo Usuário</h2>
            <input id="nomeAdd" placeholder="Nome" required>
            <input id="emailAdd" placeholder="Email" type="email" required>
            <input id="telefoneAdd" placeholder="Telefone">
            <select id="tipoAdd">
                <option value="" disabled selected>Tipo de Usuário</option>
                <option value="ADM">ADM</option>
                <option value="Porteiro">Porteiro</option>
            </select>
            <input id="senhaAdd" placeholder="Senha" type="password" required>

            <div class="modal-buttons">
                <button onclick="fecharModal('modalAdicionar')">Cancelar</button>
                <button onclick="adicionarUsuario()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <h2>Editar Usuário</h2>
            <input id="idEdit" type="hidden">
            <input id="nomeEdit" required placeholder="Nome">
            <input id="emailEdit" type="email" required placeholder="Email">
            <input id="telefoneEdit" placeholder="Telefone">
            <select id="tipoEdit">
                <option value="ADM">ADM</option>
                <option value="Porteiro">Porteiro</option>
            </select>
            <input id="senhaEdit" type="password" placeholder="Nova senha (opcional)">

            <div class="modal-buttons">
                <button onclick="fecharModal('modalEditar')">Cancelar</button>
                <button onclick="salvarEdicao()">Atualizar</button>
            </div>
        </div>
    </div>

    <footer class="footer-onda">
        <img src="../img/tela1.png" alt="SENAI">
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const menuBtn = document.getElementById("menu-btn");
            const sideMenu = document.getElementById("side-menu");
            const tabela = document.querySelector(".tabela-wrapper");
            const overlay = document.getElementById("overlay");
            const botaoAdicionar = document.querySelector(".menu-mais");
            const botaoSair = document.querySelector(".menu-config");

            function fecharMenu() {
                sideMenu.classList.remove("open");
                tabela.classList.remove("shift");
                overlay.classList.remove("active");
                botaoAdicionar.classList.remove("faded");
                botaoSair.classList.remove("faded");
            }

            menuBtn.addEventListener("click", () => {
                const aberto = sideMenu.classList.toggle("open");
                tabela.classList.toggle("shift", aberto);
                overlay.classList.toggle("active", aberto);
                botaoAdicionar.classList.toggle("faded", aberto);
                botaoSair.classList.toggle("faded", aberto);
            });

            overlay.addEventListener("click", fecharMenu);
        });
    </script>

</body>
</html>
